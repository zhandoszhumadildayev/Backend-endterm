services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-literacy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-literacy_password}
      POSTGRES_DB: ${POSTGRES_DB:-literacy_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-literacy_user} -d ${POSTGRES_DB:-literacy_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL:-postgresql://literacy_user:literacy_password@postgres:5432/literacy_db?schema=public}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_this_access_secret_for_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret_for_production}
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "5000:5000"
    command: sh -c "npx prisma migrate deploy && npm run seed && npm run dev"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000/api/v1
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:
